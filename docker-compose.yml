services:
  # =========================================
  # ⚙️ 1. Backend API (NestJS - backend-nest)
  # =========================================
  backend:
    build:
      context: ./backend-nest
      dockerfile: Dockerfile
    container_name: bthwani-backend
    restart: unless-stopped
    env_file: ./backend-nest/.env
    environment:
      # إعدادات الاتصال الداخلية
      - REDIS_HOST=tagdod-redis
      - REDIS_PORT=6379
    networks:
      - bthwani-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health/liveness', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # =========================================
  # 💻 2. Website (Dashboard & Landing)
  # =========================================
  admin-dashboard:
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
    container_name: bthwani-admin-dashboard
    restart: unless-stopped
    env_file: ./admin-dashboard/.env
    networks:
      - bthwani-network

  # =========================================
  # 📱 3. Web App (User Application)
  # =========================================
  bthwani-web:
    build:
      context: ./bthwani-web
      dockerfile: Dockerfile
    container_name: bthwani-webapp
    restart: unless-stopped
    env_file: ./bthwani-web/.env
    networks:
      - bthwani-network

# =========================================
# 🕸️ Network
# =========================================
networks:
  bthwani-network:
    external: true
    name: tagdod-network-v2
